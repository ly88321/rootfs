set ikversion=%version%
set default=0
set timeout=2
set prefix=/boot/grub
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue
set gfxpayload=800x600x32
set initrd_length=%initrd_length%

menuentry "iKuai RouterOS CD install" "$ikversion" "$initrd_length" {
	linux /boot/vmlinuz root=/dev/ram0 rootfstype=ext4 rootwait retain_initrd console=tty0 bootguide=cd ikversion=$2 initrd_length=%initrd_length%
	initrd /boot/rootfs
}
